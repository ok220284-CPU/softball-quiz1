<title>ソフトボール 上級クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#f5f0ea;color:#1a1a1a;min-height:100vh;min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
.bg-accent{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.bg-accent--warm{top:-20%;right:-15%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,120,40,.08) 0%,transparent 70%)}
.bg-accent--cool{bottom:-15%;left:-10%;width:350px;height:350px;background:radial-gradient(circle,rgba(40,100,200,.06) 0%,transparent 70%)}
.container{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:20px 16px;min-height:100vh;min-height:100dvh}
.container--center{display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo-circle{width:96px;height:96px;border-radius:50%;background:linear-gradient(145deg,#ff8c32,#e06010);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(255,140,50,.25);margin-bottom:24px}
.logo-circle span{font-size:48px}
.title{font-size:28px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#e0600f,#c04000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent}
.subtitle{font-size:16px;font-weight:600;color:#6b5b4f;letter-spacing:4px;margin-top:4px}
.desc{text-align:center;color:#7a6e62;font-size:13px;line-height:1.7;margin:20px 0 24px}
/* 設定セクション */
.setting-section{width:100%;margin-bottom:16px}
.setting-label{font-size:13px;font-weight:700;color:#6b5b4f;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.setting-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:2px solid rgba(0,0,0,.12);background:#fff;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#5a5048;cursor:pointer;transition:all .2s}
.chip.active{border-color:#e06010;background:rgba(224,96,16,.08);color:#c04000}
.chip:active{transform:scale(.96)}
.btn-start{background:linear-gradient(135deg,#ff8c32,#e05a10);color:#fff;border:none;border-radius:14px;padding:16px 48px;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 24px rgba(255,100,30,.3);transition:transform .15s,box-shadow .15s;margin-top:8px}
.btn-start:active{transform:scale(.96)}
.btn-stats{background:none;border:2px solid rgba(0,0,0,.12);border-radius:12px;padding:10px 24px;font-size:14px;font-weight:600;color:#6b5b4f;cursor:pointer;margin-top:12px;transition:all .2s}
.btn-stats:active{transform:scale(.96)}
/* クイズ画面 */
.progress-bar{width:100%;height:6px;border-radius:3px;background:rgba(0,0,0,.08);overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff8c32,#ffb86c);transition:width .4s ease}
.header-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-num{font-size:13px;font-weight:600;color:#8a7d70}
.score-label{font-size:14px;font-weight:700;color:#d45a10;display:flex;align-items:center;gap:6px}
.streak-badge{font-size:12px;background:rgba(255,100,30,.12);border-radius:8px;padding:2px 8px;color:#c04a00}
.question-card{background:#ffffff;border:1px solid rgba(0,0,0,.08);border-radius:18px;padding:28px 20px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.question-text{font-size:16px;line-height:1.8;font-weight:600;color:#1a1a1a}
.question-cat{font-size:11px;font-weight:600;color:#8a7d70;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.cat-badge{background:rgba(0,0,0,.06);border-radius:6px;padding:2px 8px}
.lv-badge{border-radius:6px;padding:2px 8px}
.lv-badge--1{background:rgba(80,200,120,.15);color:#2a7a40}
.lv-badge--2{background:rgba(255,180,50,.15);color:#a06000}
.lv-badge--3{background:rgba(232,80,80,.15);color:#a03030}
.btn-row{display:flex;gap:14px;margin-bottom:20px}
.btn-ans{flex:1;border-radius:16px;padding:20px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;background:#ffffff;color:#1a1a1a;transition:all .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.btn-ans[disabled]{cursor:default}
.btn-ans--maru{border:2px solid #50c878}
.btn-ans--batsu{border:2px solid #e85050}
.btn-ans .symbol{font-size:36px;font-weight:800}
.btn-ans--maru .symbol{color:#2a9d50}
.btn-ans--batsu .symbol{color:#d03030}
.btn-ans .label{font-size:12px;font-weight:600;color:#8a7d70}
.btn-ans--correct{background:rgba(80,200,120,.15)!important;border-color:#50c878!important}
.btn-ans--wrong{background:rgba(232,80,80,.15)!important;border-color:#e85050!important}

.feedback{background:#ffffff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.feedback--correct{border-left:4px solid #50c878}
.feedback--wrong{border-left:4px solid #e85050}
.fb-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fb-icon{font-size:24px}
.fb-title{font-size:16px;font-weight:700}
.fb-hint{font-size:13px;line-height:1.7;color:#3a3a3a}
.btn-next{width:100%;background:linear-gradient(135deg,#ff8c32,#e05a10);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;letter-spacing:1px;transition:transform .15s}

/* 結果画面 */
.result-emoji{font-size:64px;margin-bottom:16px}

.score-circle{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.score-big{font-size:56px;font-weight:800;color:#d45a10}
.score-denom{font-size:20px;font-weight:600;color:#8a7d70}
.result-msg{font-size:14px;color:#5a5048;margin-bottom:16px;text-align:center;line-height:1.6}
.result-streak{font-size:13px;color:#c04a00;background:rgba(255,100,30,.1);border-radius:8px;padding:4px 12px;margin-bottom:16px}
.review-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;justify-content:center}

/* 統計画面 */
.stats-card{width:100%;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stats-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stats-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.stats-row:last-child{border-bottom:none}
.stats-label{font-size:13px;color:#6b5b4f}
.stats-value{font-size:16px;font-weight:700;color:#d45a10}
.miss-item{padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.miss-item:last-child{border-bottom:none}
.miss-q{font-size:12px;line-height:1.5;color:#3a3a3a}
.miss-count{font-size:11px;font-weight:600;color:#a03030;margin-top:2px}
.btn-back{background:none;border:2px solid rgba(0,0,0,.12);border-radius:12px;padding:12px 32px;font-size:14px;font-weight:600;color:#6b5b4f;cursor:pointer;margin-top:8px}
.btn-back:active{transform:scale(.96)}
.btn-reset-stats{background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;margin-top:12px;text-decoration:underline}

/* AI関連 */
.ai-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;width:100%;transition:transform .15s}
.ai-btn:active{transform:scale(.96)}
.ai-btn:disabled{opacity:.5;cursor:default}
.ai-btn--outline{background:none;border:2px solid #6366f1;color:#6366f1}
.ai-btn--start{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:14px;padding:14px 36px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;letter-spacing:1px;box-shadow:0 6px 24px rgba(99,102,241,.3)}
.ai-response{background:#f0f0ff;border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:16px;margin-top:12px;font-size:13px;line-height:1.7;color:#1a1a1a;white-space:pre-wrap}
.ai-loading{text-align:center;color:#6366f1;font-size:13px;padding:12px}
.ai-badge{display:inline-block;background:rgba(99,102,241,.1);color:#6366f1;font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px;margin-bottom:8px}
.api-key-section{width:100%;margin-top:16px;padding-top:16px;border-top:1px solid rgba(0,0,0,.08)}
.api-key-row{display:flex;gap:8px;align-items:center}
.api-key-input{flex:1;border:1px solid rgba(0,0,0,.15);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit}
.api-key-btn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer}
.api-key-status{font-size:11px;color:#888;margin-top:4px}
.hidden{display:none!important}
.fade-enter{animation:fadeIn .3s ease}
.fade-exit{animation:fadeOut .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>
<div class="bg-accent bg-accent--warm"></div>
<div class="bg-accent bg-accent--cool"></div>

<!-- スタート画面 -->
<div id="screen-start" class="container container--center">
  <div class="logo-circle"><span>🥎</span></div>
  <h1 class="title">ソフトボール</h1>
  <h2 class="subtitle">上級クイズ</h2>
  <p class="desc">カテゴリ・難易度を選んで挑戦！</p>

  <div class="setting-section">
    <div class="setting-label">📂 カテゴリ</div>
    <div class="setting-chips" id="cat-chips">
      <button class="chip active" data-cat="all">全部</button>
      <button class="chip" data-cat="rule">ルール</button>
      <button class="chip" data-cat="size">寸法</button>
      <button class="chip" data-cat="strike">ストゾーン</button>
      <button class="chip" data-cat="history">歴史</button>
    </div>
  </div>

  <div class="setting-section">
    <div class="setting-label">⭐ 難易度</div>
    <div class="setting-chips" id="lv-chips">
      <button class="chip active" data-lv="0">ミックス</button>
      <button class="chip" data-lv="1">初級</button>
      <button class="chip" data-lv="2">中級</button>
      <button class="chip" data-lv="3">上級</button>
    </div>
  </div>

  <div class="setting-section">
    <div class="setting-label">📝 問題数</div>
    <div class="setting-chips" id="cnt-chips">
      <button class="chip active" data-cnt="10">10問</button>
      <button class="chip" data-cnt="20">20問</button>
      <button class="chip" data-cnt="0">全問</button>
    </div>
  </div>

  <button class="btn-start" id="btn-start">スタート</button>
  <button class="btn-stats" id="btn-show-stats">📊 統計を見る</button>
  <button class="ai-btn--start" id="btn-ai-quiz" onclick="startAiQuiz()">🤖 AI問題に挑戦</button>

  <div class="api-key-section">
    <div class="setting-label">🔑 Gemini APIキー</div>
    <div class="api-key-row">
      <input type="password" class="api-key-input" id="api-key-input" placeholder="APIキーを貼り付け">
      <button class="api-key-btn" onclick="saveApiKey()">保存</button>
    </div>
    <div class="api-key-status" id="api-key-status"></div>
  </div>
</div>

<!-- クイズ画面 -->
<div id="screen-quiz" class="container hidden">
  <div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="header-info"><span class="q-num" id="q-num"></span><span class="score-label" id="score-label"></span></div>
    <div class="question-card">
      <div class="question-cat" id="question-cat"></div>
      <p class="question-text" id="question-text"></p>
    </div>
    <div class="btn-row">
      <button class="btn-ans btn-ans--maru" id="btn-maru" onclick="handleAnswer(true)"><span class="symbol">○</span><span class="label">正しい</span></button>
      <button class="btn-ans btn-ans--batsu" id="btn-batsu" onclick="handleAnswer(false)"><span class="symbol">✕</span><span class="label">誤り</span></button>
    </div>
    <div class="feedback hidden" id="feedback">
      <div class="fb-head"><span class="fb-icon" id="fb-icon"></span><span class="fb-title" id="fb-title"></span></div>
      <p class="fb-hint" id="fb-hint"></p>
      <button class="ai-btn" id="btn-ai-explain" onclick="askAiExplain()" style="display:none">🤖 AIに詳しく聞く</button>
      <div id="ai-explain-area"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="container container--center hidden">
  <span class="result-emoji" id="res-emoji"></span>
  <h2 class="result-grade" id="res-grade"></h2>
  <div class="score-circle"><span class="score-big" id="res-score"></span><span class="score-denom" id="res-denom"></span></div>
  <p class="result-msg" id="res-msg"></p>
  <div class="result-streak hidden" id="res-streak"></div>
  <div class="review-wrap" id="review-wrap"></div>
  <button class="btn-start" onclick="showScreen('start')">もう一度挑戦</button>
  <button class="btn-stats" onclick="showScreen('stats');renderStats()">📊 統計を見る</button>
</div>

<!-- 統計画面 -->
<div id="screen-stats" class="container hidden">
  <h2 style="font-size:20px;font-weight:800;color:#1a1a1a;margin-bottom:20px;text-align:center">📊 統計データ</h2>

  <div class="stats-card">
    <div class="stats-title">🏆 総合成績</div>
    <div class="stats-row"><span class="stats-label">プレイ回数</span><span class="stats-value" id="st-plays">0</span></div>
    <div class="stats-row"><span class="stats-label">総回答数</span><span class="stats-value" id="st-total">0</span></div>
    <div class="stats-row"><span class="stats-label">正解率</span><span class="stats-value" id="st-rate">-</span></div>
    <div class="stats-row"><span class="stats-label">最大連続正解</span><span class="stats-value" id="st-best-streak">0</span></div>
  </div>

  <div class="stats-card">
    <div class="stats-title">❌ よく間違える問題 TOP5</div>
    <div id="st-miss-list"><p style="font-size:13px;color:#aaa">データなし</p></div>
  </div>

  <div style="text-align:center">
    <button class="btn-back" onclick="showScreen('start')">← 戻る</button>
    <br>
    <button class="btn-reset-stats" onclick="resetStats()">統計をリセット</button>
  </div>
</div>

<script>
// ===== QUESTIONS (100問: cat=カテゴリ, lv=難易度1-3) =====
var QUESTIONS = [
  { q: "インフィールドフライが宣告された場合、ランナーはリタッチせずに進塁できる。", a: false, hint: "インフィールドフライでもフライのルールが適用され、リタッチ義務があります。", cat: "rule", lv: 1 },
  { q: "DP（指名選手）とFLEX（守備専門選手）は試合中に役割を入れ替えることができる。", a: true, hint: "ISF公式ルールではDP/FLEXの入れ替えが認められています。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、投手はセットポジションから両手を離した後、再度合わせてから投球してもよい。", a: false, hint: "両手を離した時点で投球動作の開始とみなされ、再度合わせることは不正投球です。", cat: "rule", lv: 2 },
  { q: "タイブレーカー制では、前のイニングの最終打者がランナーとして二塁に置かれる。", a: true, hint: "国際ルールでは前イニング最後の打者が二塁走者として出発します。", cat: "rule", lv: 1 },
  { q: "ソフトボールの投手板から本塁までの距離は、男子と女子で同じである。", a: false, hint: "男子は14.02m（46フィート）、女子は13.11m（43フィート）です。", cat: "rule", lv: 1 },
  { q: "打者がバントの構えをしたが、バットを引いた場合、ストライクが宣告される。", a: false, hint: "バントの構えを引いた場合はストライクにはなりません。ボールゾーンならボールです。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、振り逃げは第3ストライクが正規に捕球されなかった場合に発生するが、一塁にランナーがいる場合は2アウト時のみ適用される。", a: true, hint: "0アウト・1アウトで一塁にランナーがいる場合は振り逃げ不可、2アウト時のみ可能です。", cat: "rule", lv: 3 },
  { q: "不正投球が宣告された場合、打者には自動的にボールが1つ加算される。", a: true, hint: "不正投球ではボールが1つカウントされ、ランナーがいれば1つ進塁します。", cat: "rule", lv: 2 },
  { q: "ソフトボールの公式球の周囲は、野球のボールよりも大きい。", a: true, hint: "ソフトボールは約30.5cm、野球は約23cmで、ソフトボールの方が大きいです。", cat: "rule", lv: 1 },
  { q: "リリースされた投球がストライクゾーンを通過していれば、投球フォームが不正でもストライクである。", a: false, hint: "不正投球が宣告された場合、球がストライクゾーンを通過してもボールとなります。", cat: "rule", lv: 2 },
  { q: "ソフトボールのルールでは、守備側がアピールプレイを行う前にタイムが宣告された場合、アピール権は消滅する。", a: false, hint: "タイム後もアピールプレイは可能です。次のプレイ開始まで有効です。", cat: "rule", lv: 3 },
  { q: "走者が故意に打球に触れた場合、走者はアウトになり、ボールデッドとなる。", a: true, hint: "故意に打球に触れた走者はアウト、ボールデッドで他の走者は元の塁に戻ります。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、投手が投球動作に入った後にステップオフ（プレートを外す）することが認められている。", a: false, hint: "投球動作開始後のステップオフは不正投球となります。", cat: "rule", lv: 2 },
  { q: "ソフトボールの国際大会では、7イニング制が標準である。", a: true, hint: "ソフトボールは7イニング制です。野球の9イニングとは異なります。", cat: "rule", lv: 1 },
  { q: "打者走者が一塁をオーバーランした際、二塁に向かう意思を示していなければ、フェアゾーン側に戻ってもタッグアウトにならない。", a: false, hint: "一塁オーバーラン後、フェアゾーン側に戻るとタッグアウトの対象となります。ファウルゾーン側に戻る必要があります。", cat: "rule", lv: 3 },
  { q: "ソフトボールでは、投手はウインドミル投法以外にスリングショット投法も公式に認められている。", a: true, hint: "ウインドミル投法とスリングショット投法の両方が公式に認められています。", cat: "rule", lv: 1 },
  { q: "ファウルボールが直接キャッチャーのマスクに挟まった場合、ボールデッドとなりランナーは1つ進塁できる。", a: true, hint: "ファウルボールがマスクや用具に挟まった場合、ボールデッドで走者は1個進塁します。", cat: "rule", lv: 3 },
  { q: "ソフトボールでは、投手の投球間隔に時間制限はない。", a: false, hint: "投手はプレイ宣告後、一定時間内に投球しなければなりません。", cat: "rule", lv: 2 },
  { q: "フェアボールが走者に当たった場合、その走者は常にアウトになる。", a: false, hint: "野手が触れる前のフェアボールが走者に当たった場合はアウトですが、野手が一度触れた後なら走者はアウトにはなりません。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、コリジョンルール（衝突防止ルール）が国際大会で採用されている。", a: true, hint: "国際ソフトボール連盟（WBSC）ではコリジョンルールが採用されています。", cat: "rule", lv: 2 },
  { q: "ソフトボールの塁間距離は、男子・女子ともに18.29m（60フィート）である。", a: true, hint: "塁間距離は男女共通で18.29m（60フィート）です。", cat: "rule", lv: 1 },
  { q: "三塁走者がスクイズプレイ中にホームスチールを試み、打者がバントを空振りした場合、走者はアウトにならずに三塁に戻れる。", a: false, hint: "打者がバントを空振りしても走者は戻れず、捕手にタッグされればアウトになります。", cat: "rule", lv: 3 },
  { q: "ソフトボールでは、打者が打席中にバッターボックスの線を完全に踏み越えて打った場合、アウトとなる。", a: true, hint: "打者がバッターボックス外で打球に触れた場合はアウトです。", cat: "rule", lv: 2 },
  { q: "故意四球（敬遠）は、投手が実際に4球投げなくてもベンチからの申告で成立する。", a: true, hint: "2020年のルール改正で、申告敬遠が導入されました。", cat: "rule", lv: 1 },
  { q: "ソフトボールでは、打順を誤った場合、守備側のアピールがなければそのまま試合は続行される。", a: true, hint: "打順間違いは守備側がアピールしなければ有効となり、そのまま続行されます。", cat: "rule", lv: 2 },
  { q: "犠牲フライでタッチアップする走者は、野手がボールに最初に触れた時点で離塁できる。", a: true, hint: "タッチアップは野手が最初にボールに触れた瞬間から離塁可能です。", cat: "rule", lv: 1 },
  { q: "ソフトボールでは、雨天コールドゲームは5イニング完了で成立する。", a: false, hint: "ソフトボールの正式試合は7イニングですが、コールドゲームは4イニング（後攻がリードなら3回半）完了で成立します。", cat: "rule", lv: 2 },
  { q: "ソフトボールの投手がリープ（跳躍投球）をした場合、現行ルールでも不正投球となる。", a: false, hint: "2012年のルール改正でツーステップ（リープ含む）が認められ、現行ルールでは不正投球ではありません。", cat: "rule", lv: 3 },
  { q: "隠し球（ヒドゥンボールトリック）は、ソフトボールの公式ルールで禁止されている。", a: false, hint: "隠し球は禁止されていません。投手がプレートを踏んでいない状態で行えば合法です。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、同一イニングで一度交代した選手が再び出場することができる。", a: true, hint: "ソフトボールには再出場（リエントリー）制度があり、スターティングメンバーは一度交代しても再出場できます。", cat: "rule", lv: 1 },
  { q: "ソフトボールでは、打者が故意に投球に当たりに行った場合でも死球が宣告される。", a: false, hint: "打者が故意に投球に当たりに行った場合、死球は宣告されません。ストライクが宣告されます。", cat: "rule", lv: 2 },
  { q: "ソフトボールでは、二塁走者が三塁へ盗塁する際、投手がセットポジションに入る前に走り出しても盗塁は有効である。", a: false, hint: "投手がプレートを踏んでボールを持っている状態では、走者は塁を離れることができません。離塁は投球がリリースされてからです。", cat: "rule", lv: 3 },
  { q: "ソフトボールでは、守備妨害が発生した場合、打者は必ず一塁への安全進塁権を得る。", a: false, hint: "守備妨害の種類によって処置が異なります。打者が一塁を得るとは限りません。", cat: "rule", lv: 3 },
  { q: "ソフトボールのウインドミル投法では、腕の回転は1回転までと制限されている。", a: true, hint: "ウインドミル投法での腕の回転は1回転（360度）までに制限されています。", cat: "rule", lv: 2 },

function soundWrong() { playTone(200, 0.2, 'square', 0.15); setTimeout(function() { playTone(150, 0.4, 'square', 0.15); }, 150); }
function soundTap() { playTone(600, 0.05, 'sine', 0.15); }
function soundStart() { playTone(523, 0.12, 'sine', 0.2); setTimeout(function() { playTone(659, 0.12, 'sine', 0.2); }, 100); setTimeout(function() { playTone(784, 0.25, 'sine', 0.2); }, 200); }
function soundResult() { playTone(523, 0.15, 'sine', 0.2); setTimeout(function() { playTone(659, 0.15, 'sine', 0.2); }, 150); setTimeout(function() { playTone(784, 0.15, 'sine', 0.2); }, 300); setTimeout(function() { playTone(1047, 0.4, 'sine', 0.25); }, 450); }

// ===== STATE =====
var selCat = 'all', selLv = 0, selCnt = 10;
var questions = [], idx = 0, score = 0, selected = null, history = [], streak = 0, bestStreak = 0;

// ===== STATS (localStorage) =====
var STATS_KEY = 'sb_quiz_stats';
function loadStats() { try { var s = localStorage.getItem(STATS_KEY); return s ? JSON.parse(s) : { plays: 0, totalQ: 0, totalCorrect: 0, bestStreak: 0, misses: {} }; } catch(e) { return { plays: 0, totalQ: 0, totalCorrect: 0, bestStreak: 0, misses: {} }; } }
function saveStats(s) { try { localStorage.setItem(STATS_KEY, JSON.stringify(s)); } catch(e) {} }
function updateStats(hist, bs) {
  var s = loadStats();
  s.plays++;
  for (var i = 0; i < hist.length; i++) {
    s.totalQ++;
    if (hist[i].correct) { s.totalCorrect++; }
    else {
      var key = hist[i].qText.substring(0, 40);
      s.misses[key] = (s.misses[key] || 0) + 1;
    }
  }
  if (bs > s.bestStreak) s.bestStreak = bs;
  saveStats(s);
}
function resetStats() { if (confirm('統計データをリセットしますか？')) { localStorage.removeItem(STATS_KEY); renderStats(); } }

// ===== UTILITIES =====
function shuffle(a) { var b = a.slice(); for (var i = b.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = b[i]; b[i] = b[j]; b[j] = t; } return b; }
function $(id) { return document.getElementById(id); }
function showScreen(n) { ['screen-start', 'screen-quiz', 'screen-result', 'screen-stats'].forEach(function(s) { $(s).classList.toggle('hidden', s !== 'screen-' + n); }); }

// ===== CHIP SELECTION =====
function setupChips() {
  var catChips = document.querySelectorAll('#cat-chips .chip');
  catChips.forEach(function(c) { c.addEventListener('click', function() { catChips.forEach(function(x) { x.classList.remove('active'); }); c.classList.add('active'); selCat = c.getAttribute('data-cat'); }); });
  var lvChips = document.querySelectorAll('#lv-chips .chip');
  lvChips.forEach(function(c) { c.addEventListener('click', function() { lvChips.forEach(function(x) { x.classList.remove('active'); }); c.classList.add('active'); selLv = parseInt(c.getAttribute('data-lv')); }); });
  var cntChips = document.querySelectorAll('#cnt-chips .chip');
  cntChips.forEach(function(c) { c.addEventListener('click', function() { cntChips.forEach(function(x) { x.classList.remove('active'); }); c.classList.add('active'); selCnt = parseInt(c.getAttribute('data-cnt')); }); });
}

// ===== QUIZ LOGIC =====
function startQuiz() {
  initAudio(); soundStart();
  var pool = QUESTIONS.filter(function(q) {
    if (selCat !== 'all' && q.cat !== selCat) return false;
    if (selLv !== 0 && q.lv !== selLv) return false;
    return true;
  });
  if (pool.length === 0) { alert('条件に合う問題がありません'); return; }
  pool = shuffle(pool);
  var cnt = selCnt === 0 ? pool.length : Math.min(selCnt, pool.length);
  questions = pool.slice(0, cnt);
  idx = 0; score = 0; selected = null; history = []; streak = 0; bestStreak = 0;
  showScreen('quiz'); renderQuestion();
}

function renderQuestion() {
  var q = questions[idx];
  $('progress-fill').style.width = ((idx + 1) / questions.length * 100) + '%';
  $('q-num').textContent = 'Q' + (idx + 1) + '/' + questions.length;
  var s = score + '点';
  if (streak >= 2) s += ' <span class="streak-badge">\uD83D\uDD25' + streak + '連続</span>';
  $('score-label').innerHTML = s;
  $('question-cat').innerHTML = '<span class="cat-badge">' + CAT_LABELS[q.cat] + '</span><span class="lv-badge lv-badge--' + q.lv + '">' + LV_LABELS[q.lv] + '</span>';
  $('question-text').textContent = q.q;
  var m = $('btn-maru'), b = $('btn-batsu');
  m.disabled = false; b.disabled = false;
  m.className = 'btn-ans btn-ans--maru'; b.className = 'btn-ans btn-ans--batsu';
  $('feedback').classList.add('hidden'); selected = null;
  $('screen-quiz').classList.remove('fade-exit'); $('screen-quiz').classList.add('fade-enter');
}

function handleAnswer(ans) {
  if (selected !== null) return; initAudio(); selected = ans;
  var q = questions[idx], correct = ans === q.a;
  if (correct) { soundCorrect(); score++; streak++; } else { soundWrong(); streak = 0; }
  if (streak > bestStreak) bestStreak = streak;
  history.push({ correct: correct, qText: q.q });
  var s = score + '点';
  if (streak >= 2) s += ' <span class="streak-badge">\uD83D\uDD25' + streak + '連続</span>';
  $('score-label').innerHTML = s;
  var m = $('btn-maru'), b = $('btn-batsu');
  m.disabled = true; b.disabled = true;
  if (q.a === true) m.classList.add('btn-ans--correct'); else b.classList.add('btn-ans--correct');
  if (!correct) { if (ans === true) m.classList.add('btn-ans--wrong'); else b.classList.add('btn-ans--wrong'); }
  if (q.a === true) b.classList.add('btn-ans--dim'); else m.classList.add('btn-ans--dim');
  var fb = $('feedback'); fb.classList.remove('hidden', 'feedback--correct', 'feedback--wrong');
  fb.classList.add(correct ? 'feedback--correct' : 'feedback--wrong');
  $('fb-icon').textContent = correct ? '\u2705' : '\u274C';
  $('fb-title').textContent = correct ? '正解！' : '不正解…';
  $('fb-hint').textContent = q.hint;
  $('btn-next').textContent = (idx + 1 >= questions.length) ? '結果を見る' : '次の問題へ →';
}

function nextQuestion() {
  soundTap();
  if (idx + 1 >= questions.length) { showResult(); }
  else { $('screen-quiz').classList.add('fade-exit'); $('screen-quiz').classList.remove('fade-enter'); setTimeout(function() { idx++; renderQuestion(); }, 200); }
}

function showResult() {
  updateStats(history, bestStreak);
  showScreen('result'); soundResult();
  var total = questions.length;
  var pct = Math.round(score / total * 100);
  var g;
  if (pct === 100) g = { label: '完璧！', emoji: '\uD83C\uDFC6', msg: 'ソフトボール博士！全問正解は見事です！' };
  else if (pct >= 80) g = { label: '素晴らしい！', emoji: '\uD83E\uDD47', msg: 'かなりの知識量ですね！' };
  else if (pct >= 60) g = { label: 'なかなか！', emoji: '\uD83E\uDD48', msg: '上級者として十分な実力です。' };
  else if (pct >= 40) g = { label: 'まずまず', emoji: '\uD83E\uDD49', msg: 'もう少し勉強してみましょう！' };
  else g = { label: '要復習', emoji: '\uD83D\uDCD6', msg: 'ルールブックを読み直してリベンジ！' };
  $('res-emoji').textContent = g.emoji; $('res-grade').textContent = g.label;
  $('res-score').textContent = score; $('res-denom').textContent = '/ ' + total;
  $('res-msg').textContent = g.msg;
  var se = $('res-streak');
  if (bestStreak >= 2) { se.textContent = '最大連続正解: \uD83D\uDD25' + bestStreak; se.classList.remove('hidden'); } else { se.classList.add('hidden'); }
  var w = $('review-wrap'); w.innerHTML = '';
  history.forEach(function(h, i) { var d = document.createElement('div'); d.className = 'review-item ' + (h.correct ? 'review-item--ok' : 'review-item--ng'); d.innerHTML = '<span>' + (h.correct ? '\u2705' : '\u274C') + '</span><span>Q' + (i + 1) + '</span>'; w.appendChild(d); });
}

// ===== STATS RENDERING =====
function renderStats() {
  var s = loadStats();
  $('st-plays').textContent = s.plays;
  $('st-total').textContent = s.totalQ;
  $('st-rate').textContent = s.totalQ > 0 ? Math.round(s.totalCorrect / s.totalQ * 100) + '%' : '-';
  $('st-best-streak').textContent = s.bestStreak;
  var ml = $('st-miss-list'); ml.innerHTML = '';
  var missArr = [];
  for (var k in s.misses) { missArr.push({ q: k, count: s.misses[k] }); }
  missArr.sort(function(a, b) { return b.count - a.count; });
  if (missArr.length === 0) { ml.innerHTML = '<p style="font-size:13px;color:#aaa">データなし</p>'; return; }
  var top5 = missArr.slice(0, 5);
  top5.forEach(function(m) {
    var d = document.createElement('div'); d.className = 'miss-item';
    d.innerHTML = '<div class="miss-q">' + m.q + '...</div><div class="miss-count">\u274C ' + m.count + '回</div>';
    ml.appendChild(d);
  });
}

// ===== INIT =====
setupChips();
$('btn-start').addEventListener('click', startQuiz);
$('btn-show-stats').addEventListener('click', function() { showScreen('stats'); renderStats(); });

// ===== GEMINI API =====
var API_KEY_STORAGE = 'sb_quiz_apikey';
function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }
function saveApiKey() {
  var k = $('api-key-input').value.trim();
  if (k) { localStorage.setItem(API_KEY_STORAGE, k); $('api-key-status').textContent = '✅ 保存しました'; $('api-key-input').value = ''; }
  else { $('api-key-status').textContent = '❌ キーを入力してください'; }
}
function initApiKeyUI() {
  var k = getApiKey();
  $('api-key-status').textContent = k ? '✅ 設定済み' : '未設定（AI機能を使うには設定してください）';
}

async function callGemini(prompt) {
  var key = getApiKey();
  if (!key) throw new Error('APIキーが未設定。スタート画面で設定してください。');
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + key;
  var res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: 1024, temperature: 0.7 }
    })
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  var data = await res.json();
  if (data.candidates && data.candidates[0] && data.candidates[0].content) {
    return data.candidates[0].content.parts[0].text;
  }
  throw new Error('No response');
}

// ===== AI解説深掘り =====
function showAiButton() {
  var key = getApiKey();
  var btn = $('btn-ai-explain');
  if (key && btn) btn.style.display = 'block';
}

async function askAiExplain() {
  var q = questions[idx];
  var area = $('ai-explain-area');
  var btn = $('btn-ai-explain');
  btn.disabled = true; btn.textContent = '🤖 読み込み中...';
  area.innerHTML = '<div class="ai-loading">⏳ AIが解説を作成中...</div>';
  try {
    var prompt = 'あなたはソフトボールのルールに詳しい解説者です。以下の○×クイズについて、なぜその答えになるのか、背景や関連するルール改正の経緯も含めて分かりやすく解説してください。200文字程度で。\n\n問題: ' + q.q + '\n答え: ' + (q.a ? '○（正しい）' : '×（誤り）') + '\nヒント: ' + q.hint;
    var text = await callGemini(prompt);
    area.innerHTML = '<div class="ai-response"><div class="ai-badge">🤖 AI解説</div><br>' + text.replace(/\n/g, '<br>') + '</div>';
  } catch(e) {
    area.innerHTML = '<div class="ai-response" style="color:#a03030">❌ ' + e.message + '</div>';
  }
  btn.style.display = 'none';
}

// handleAnswer内でAIボタンを表示するためのフック
var _origHandleAnswer = handleAnswer;
handleAnswer = function(ans) {
  _origHandleAnswer(ans);
  showAiButton();
};

// ===== AI問題生成 =====
var aiQuestions = [], aiIdx = 0, aiScore = 0, aiHistory = [];
async function startAiQuiz() {
  var key = getApiKey();
  if (!key) { alert('AI機能を使うにはGemini APIキーを設定してください'); return; }

  var catLabel = selCat === 'all' ? '全般' : (CAT_LABELS[selCat] || selCat);

  showScreen('quiz');
  $('progress-fill').style.width = '0%';
  $('q-num').textContent = '準備中...';
  $('score-label').innerHTML = '';
  $('question-cat').innerHTML = '<span class="ai-badge">🤖 AI生成問題</span>';
  $('question-text').textContent = 'AIが問題を生成中...⏳';
  $('btn-maru').disabled = true; $('btn-batsu').disabled = true;
  $('feedback').classList.add('hidden');

  try {
    var prompt = 'ソフトボールの' + catLabel + 'に関する○×クイズを5問作成してください。\n' +
      '各問題は上級者向けの難しい内容にしてください。\n' +
      '以下のJSON形式で返してください（JSONのみ、他のテキストは不要）:\n' +
      '[{"q":"問題文","a":true,"hint":"解説文（50文字程度）"}]\n' +
      'aはtrue（正しい）またはfalse（誤り）です。';
    var text = await callGemini(prompt);
    // JSON部分を抽出
    var jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('AIの応答形式が不正です');
    aiQuestions = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(aiQuestions) || aiQuestions.length === 0) throw new Error('問題の生成に失敗しました');
    // cat/lvを付与
    aiQuestions.forEach(function(q) { q.cat = 'ai'; q.lv = 0; });

    // AI問題モードでクイズ開始
    questions = aiQuestions;
    idx = 0; score = 0; selected = null; history = []; streak = 0; bestStreak = 0;
    $('btn-maru').disabled = false; $('btn-batsu').disabled = false;
    renderQuestion();
  } catch(e) {
    $('question-text').textContent = '❌ ' + e.message;
    setTimeout(function() { showScreen('start'); }, 3000);
  }
}

// renderQuestion内のカテゴリ表示をAI対応に
var _origRenderQuestion = renderQuestion;
renderQuestion = function() {
  _origRenderQuestion();
  var q = questions[idx];
  if (q.cat === 'ai') {
    $('question-cat').innerHTML = '<span class="ai-badge">🤖 AI生成問題</span>';
  }
  $('ai-explain-area').innerHTML = '';
  $('btn-ai-explain').style.display = 'none';
  $('btn-ai-explain').disabled = false;
  $('btn-ai-explain').textContent = '🤖 AIに詳しく聞く';
};

// CAT_LABELSにai追加
CAT_LABELS['ai'] = '🤖 AI生成';

initApiKeyUI();

</script>
