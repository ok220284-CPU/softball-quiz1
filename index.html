*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

.container{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:20px 16px;min-height:100vh;min-height:100dvh}
.container--center{display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo-circle{width:96px;height:96px;border-radius:50%;background:linear-gradient(145deg,#ff8c32,#e06010);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(255,140,50,.25);margin-bottom:24px}
.logo-circle span{font-size:48px}
.title{font-size:32px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#e0600f,#c04000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent}
.subtitle{font-size:18px;font-weight:600;color:#6b5b4f;letter-spacing:4px;margin-top:4px}
.desc{text-align:center;color:#7a6e62;font-size:14px;line-height:1.7;margin:28px 0 36px}
.btn-start{background:linear-gradient(135deg,#ff8c32,#e05a10);color:#fff;border:none;border-radius:14px;padding:16px 48px;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 24px rgba(255,100,30,.3);transition:transform .15s,box-shadow .15s}
.btn-start:active{transform:scale(.96)}
.progress-bar{width:100%;height:6px;border-radius:3px;background:rgba(0,0,0,.08);overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff8c32,#ffb86c);transition:width .4s ease}
.header-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-num{font-size:13px;font-weight:600;color:#8a7d70}
.score-label{font-size:14px;font-weight:700;color:#d45a10;display:flex;align-items:center;gap:6px}
.streak-badge{font-size:12px;background:rgba(255,100,30,.12);border-radius:8px;padding:2px 8px;color:#c04a00}
.question-card{background:#ffffff;border:1px solid rgba(0,0,0,.08);border-radius:18px;padding:28px 20px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.question-text{font-size:16px;line-height:1.8;font-weight:600;color:#1a1a1a}
.btn-row{display:flex;gap:14px;margin-bottom:20px}
.btn-ans{flex:1;border-radius:16px;padding:20px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;background:#ffffff;color:#1a1a1a;transition:all .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.btn-ans[disabled]{cursor:default}
.btn-ans--maru{border:2px solid #50c878}
.btn-ans--batsu{border:2px solid #e85050}
.btn-ans .symbol{font-size:36px;font-weight:800}
.btn-ans--maru .symbol{color:#2a9d50}
.btn-ans--batsu .symbol{color:#d03030}
.btn-ans .label{font-size:13px;font-weight:600;color:#5a5a5a}
.btn-ans--correct{background:#e8f8ee!important;border-color:#2a9d50!important;box-shadow:0 4px 16px rgba(42,157,80,.15)}
.btn-ans--wrong{background:#fde8e8!important;border-color:#d03030!important;box-shadow:0 4px 16px rgba(208,48,48,.15)}
.btn-ans--dim{opacity:.35}
.feedback{border-radius:16px;padding:20px;margin-top:4px;animation:slideUp .3s ease}
.feedback--correct{background:#e8f8ee;border:1px solid #b8e6c8}
.feedback--wrong{background:#fde8e8;border:1px solid #f0c0c0}
.feedback-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.feedback-icon{font-size:20px}
.feedback-title{font-size:16px;font-weight:700;color:#1a1a1a}
.hint-text{font-size:14px;line-height:1.7;color:#3a3a3a;margin:0 0 16px}
.btn-next{width:100%;background:#f0ebe5;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:14px;color:#1a1a1a;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-next:active{background:#e5ddd5}
.result-emoji{font-size:56px;margin-bottom:12px}
.result-grade{font-size:26px;font-weight:800;color:#d45a10;margin-bottom:16px}
.score-circle{width:120px;height:120px;border-radius:50%;border:3px solid rgba(212,90,16,.25);background:rgba(255,140,50,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px}
.score-num{font-size:42px;font-weight:800;color:#d45a10;line-height:1}
.score-denom{font-size:14px;color:#7a6e62;font-weight:600}
.result-msg{font-size:15px;color:#5a5048;text-align:center;margin-bottom:8px}
.result-streak{font-size:14px;color:#c04a00;margin-bottom:20px}
.review-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px}
.review-item{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600}
.review-item--ok{background:#e8f8ee;color:#1e7a3a}
.review-item--ng{background:#fde8e8;color:#b02020}
.fade-enter{opacity:1;transition:opacity .2s ease}
.fade-exit{opacity:0;transition:opacity .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="bg-accent bg-accent--warm"></div>
<div class="bg-accent bg-accent--cool"></div>
<div id="screen-start" class="container container--center">
  <div class="logo-circle"><span>🥎</span></div>
  <h1 class="title">ソフトボール</h1>
  <h2 class="subtitle">上級クイズ 3</h2>
  <p class="desc">○×形式 ・ 全10問<br>上級者向けのルール・知識問題</p>
  <button class="btn-start" id="btn-start">スタート</button>
</div>
<div id="screen-quiz" class="container hidden">
  <div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="header-info"><span class="q-num" id="q-num"></span><span class="score-label" id="score-label"></span></div>
  </div>
  <div class="question-card"><p class="question-text" id="question-text"></p></div>
  <div class="btn-row">
    <button class="btn-ans btn-ans--maru" id="btn-maru" onclick="handleAnswer(true)"><span class="symbol">○</span><span class="label">正しい</span></button>
    <button class="btn-ans btn-ans--batsu" id="btn-batsu" onclick="handleAnswer(false)"><span class="symbol">✕</span><span class="label">誤り</span></button>
  </div>
  <div id="feedback" class="feedback hidden">
    <div class="feedback-header"><span class="feedback-icon" id="fb-icon"></span><span class="feedback-title" id="fb-title"></span></div>
    <p class="hint-text" id="fb-hint"></p>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</div>
<div id="screen-result" class="container container--center hidden">
  <span class="result-emoji" id="res-emoji"></span>
  <h2 class="result-grade" id="res-grade"></h2>
  <div class="score-circle"><span class="score-num" id="res-score"></span><span class="score-denom" id="res-denom"></span></div>
  <p class="result-msg" id="res-msg"></p>
  <p class="result-streak hidden" id="res-streak"></p>
  <div class="review-wrap" id="review-wrap"></div>
  <button class="btn-start" onclick="startQuiz()">もう一度挑戦</button>
</div>
<script>
var QUESTIONS = [
  { q: "インフィールドフライが宣告された場合、ランナーはリタッチせずに進塁できる。", a: false, hint: "インフィールドフライでもフライのルールが適用され、リタッチ義務があります。" },
  { q: "DP（指名選手）とFLEX（守備専門選手）は試合中に役割を入れ替えることができる。", a: true, hint: "ISF公式ルールではDP/FLEXの入れ替えが認められています。" },
  { q: "ソフトボールでは、投手はセットポジションから両手を離した後、再度合わせてから投球してもよい。", a: false, hint: "両手を離した時点で投球動作の開始とみなされ、再度合わせることは不正投球です。" },
  { q: "タイブレーカー制では、前のイニングの最終打者がランナーとして二塁に置かれる。", a: true, hint: "国際ルールでは前イニング最後の打者が二塁走者として出発します。" },
  { q: "ソフトボールの投手板から本塁までの距離は、男子と女子で同じである。", a: false, hint: "男子は14.02m（46フィート）、女子は13.11m（43フィート）です。" },
  { q: "打者がバントの構えをしたが、バットを引いた場合、ストライクが宣告される。", a: false, hint: "バントの構えを引いた場合はストライクにはなりません。ボールゾーンならボールです。" },
  { q: "ソフトボールでは、振り逃げは第3ストライクが正規に捕球されなかった場合に発生するが、一塁にランナーがいる場合は2アウト時のみ適用される。", a: true, hint: "0アウト・1アウトで一塁にランナーがいる場合は振り逃げ不可、2アウト時のみ可能です。" },
  { q: "不正投球が宣告された場合、打者には自動的にボールが1つ加算される。", a: true, hint: "不正投球ではボールが1つカウントされ、ランナーがいれば1つ進塁します。" },
  { q: "ソフトボールの公式球の周囲は、野球のボールよりも大きい。", a: true, hint: "ソフトボールは約30.5cm、野球は約23cmで、ソフトボールの方が大きいです。" },
  { q: "リリースされた投球がストライクゾーンを通過していれば、投球フォームが不正でもストライクである。", a: false, hint: "不正投球が宣告された場合、球がストライクゾーンを通過してもボールとなります。" },
  { q: "ソフトボールのルールでは、守備側がアピールプレイを行う前にタイムが宣告された場合、アピール権は消滅する。", a: false, hint: "タイム後もアピールプレイは可能です。次のプレイ開始まで有効です。" },
  { q: "走者が故意に打球に触れた場合、走者はアウトになり、ボールデッドとなる。", a: true, hint: "故意に打球に触れた走者はアウト、ボールデッドで他の走者は元の塁に戻ります。" },
  { q: "ソフトボールでは、投手が投球動作に入った後にステップオフ（プレートを外す）することが認められている。", a: false, hint: "投球動作開始後のステップオフは不正投球となります。" },
  { q: "ソフトボールの国際大会では、7イニング制が標準である。", a: true, hint: "ソフトボールは7イニング制が公式ルールです。" },
  { q: "打者走者が一塁をオーバーランした際、二塁に向かう意思を示していなければ、フェアゾーン側に戻ってもタッグアウトにならない。", a: false, hint: "一塁オーバーランの特例はファウルゾーン側に戻る場合のみ適用され、フェア側に出れば意思に関係なくタッグ対象です。" },
  { q: "ソフトボールでは、投手はウインドミル投法以外にスリングショット投法も公式に認められている。", a: true, hint: "ウインドミルとスリングショットの両方がISFルールで認められた投球フォームです。" },
  { q: "ファウルボールが直接キャッチャーのマスクに挟まった場合、ボールデッドとなりランナーは1つ進塁できる。", a: true, hint: "用具に挟まった場合はボールデッドとなり、ランナーには1個の安全進塁権が与えられます。" },
  { q: "ソフトボールでは、投手の投球間隔に時間制限はない。", a: false, hint: "投手はボールを受け取ってから一定時間以内（通常10秒以内）に投球しなければなりません。" },
  { q: "フェアボールが走者に当たった場合、その走者は常にアウトになる。", a: false, hint: "内野手を通過した後のフェアボールが走者に当たった場合はアウトにならないケースがあります。" },
  { q: "ソフトボールでは、コリジョンルール（衝突防止ルール）が国際大会で採用されている。", a: true, hint: "走者と守備者の危険な衝突を防ぐため、コリジョンルールが適用されています。" },
  { q: "ソフトボールの塁間距離は、男子・女子ともに18.29m（60フィート）である。", a: true, hint: "塁間距離は男女共通で18.29m（60フィート）です。" },
  { q: "三塁走者がスクイズプレイ中にホームスチールを試み、打者がバントを空振りした場合、走者はアウトにならずに三塁に戻れる。", a: false, hint: "ボールがキャッチャーに捕球されれば、走者はタッグアウトの対象となります。" },
  { q: "ソフトボールでは、打者が打席中にバッターボックスの線を完全に踏み越えて打った場合、アウトとなる。", a: true, hint: "打者はバッターボックス内で打つ必要があり、完全に踏み越えた場合はアウトです。" },
  { q: "故意四球（敬遠）は、投手が実際に4球投げなくてもベンチからの申告で成立する。", a: true, hint: "2020年に申告敬遠が導入され、監督の申告により投球なしで四球が成立します。" },
  { q: "ソフトボールでは、打順を誤った場合、守備側のアピールがなければそのまま試合は続行される。", a: true, hint: "打順間違いはアピールプレイのため、守備側が気づいてアピールしなければ有効です。" },
  { q: "犠牲フライでタッチアップする走者は、野手がボールに最初に触れた時点で離塁できる。", a: true, hint: "リタッチのタイミングは野手の捕球完了ではなく、最初に触れた時点が基準です。" },
  { q: "ソフトボールでは、雨天コールドゲームは5イニング完了で成立する。", a: false, hint: "正式試合の成立条件は通常4イニング（後攻リードの場合3回半）完了です。" },
  { q: "ソフトボールの投手がリープ（跳躍投球）をした場合、現行ルールでも不正投球となる。", a: false, hint: "2012年のルール改正で投手の2ステップ（リープ）が認められるようになり、現在は不正投球にはなりません。" },
  { q: "隠し球（ヒドゥンボールトリック）は、ソフトボールの公式ルールで禁止されている。", a: false, hint: "隠し球は禁止されていませんが、投手がプレートに触れている間は投球と見なされるため注意が必要です。" },
  { q: "ソフトボールでは、同一イニングで一度交代した選手が再び出場することができる。", a: true, hint: "リエントリー（再出場）ルールにより、スターティングメンバーは一度だけ再出場可能です。" },
  { q: "ソフトボールでは、打者が故意に投球に当たりに行った場合でも死球が宣告される。", a: false, hint: "打者が故意に当たりに行った場合、死球は宣告されずストライクまたはボールが宣告されます。" },
  { q: "ソフトボールでは、二塁走者が三塁へ盗塁する際、投手がセットポジションに入る前に走り出しても盗塁は有効である。", a: false, hint: "投手がセットポジションに入る前の離塁はアウトとなります（離塁アウト）。" },
  { q: "ソフトボールでは、守備妨害が発生した場合、打者は必ず一塁への安全進塁権を得る。", a: false, hint: "守備妨害の状況によって処置は異なり、必ずしも一塁進塁権が与えられるわけではありません。" },
  { q: "ソフトボールのウインドミル投法では、腕の回転は1回転までと制限されている。", a: true, hint: "ウインドミル投法での腕の回転は1回転（360度）までに制限されています。" },
  { q: "ソフトボールでは、捕手が打者の打撃を妨害した場合（打撃妨害）、打者には一塁が与えられる。", a: true, hint: "打撃妨害では打者に一塁への安全進塁権が与えられます。" },
  { q: "ソフトボールでは、ベースコーチが走者に触れて進塁を補助した場合、走者はアウトになる。", a: true, hint: "ベースコーチが走者を物理的に補助する行為は禁止されており、走者はアウトとなります。" },
  { q: "打球がワンバウンドして外野フェンスを越えた場合、ホームランとなる。", a: false, hint: "ワンバウンドでフェンスを越えた場合はエンタイトルツーベース（自動的に二塁が与えられる）です。ホームランはノーバウンドでフェンスを越えた場合のみです。" },
  { q: "ソフトボールでは、試合中に金属バットが凹んだ場合、そのまま使用を続けることができる。", a: false, hint: "凹んだ・ひびの入ったバットは使用禁止です。安全上の理由から直ちに交換が必要です。" },
  { q: "ソフトボールでは、投手が投球モーション中にバランスを崩して転倒した場合、不正投球とはならない。", a: false, hint: "投球動作を完了できなかった場合は不正投球が宣告されます。" },
  { q: "ソフトボールの国際ルールでは、得点差によるコールドゲームの規定がある。", a: true, hint: "国際ルールでは、5回終了時に15点差、7回終了前で7点差などのコールドゲーム（マーシールール）規定があります。" },
  { q: "ソフトボールでは、走者がベースパスから3フィート以上離れてタッグを避けた場合、アウトとなる。", a: true, hint: "走者はタッグプレイを避けるために、ベースパスから3フィート（約91cm）以上離れるとアウトです。" },
  { q: "ソフトボールでは、フェアの打球が一塁ベースに当たって跳ね返りファウルゾーンに入った場合、ファウルボールとなる。", a: false, hint: "一塁・三塁ベースに当たった打球はフェアボールです。ベースはフェアゾーンの一部とみなされます。" },
  { q: "ソフトボールでは、審判の判定に対して監督がビデオ判定を要求できる。", a: false, hint: "ソフトボールの一般的な公式戦ではビデオ判定制度は導入されていません（一部の国際大会を除く）。" },
  { q: "ソフトボールでは、指名選手（DP）は守備につくことなく打撃のみを行うことができる。", a: true, hint: "DPは打撃専門の選手として、守備につかずに打順に入ることが認められています。2002年のルール改正でDPの守備参加や再出場も可能になりました。" },
  { q: "ソフトボールでは、ダブルベース（ダブル一塁ベース）が公式に採用されている。", a: true, hint: "一塁にはオレンジ（ファウル側）と白（フェア側）のダブルベースが使用されています。" },
  { q: "投手が投球前にグラブの中でボールを握り直すことは不正投球にあたる。", a: false, hint: "投球前にグラブ内でボールを握り直すこと自体は認められています。" },
  { q: "ソフトボールでは、打者が2ストライク後にファウルバントをした場合、三振アウトとなる。", a: true, hint: "2ストライク後のファウルバントは三振として扱われます。野球と同じルールです。" },
  { q: "テンポラリーランナー（臨時代走）は、2アウト時にキャッチャーに対してのみ認められる。", a: false, hint: "2023年のルール改正により、キャッチャーだけでなく投手にもテンポラリーランナーが認められるようになりました。" },
  { q: "ソフトボールでは、走者が守備妨害をした場合、走者だけでなく打者走者もアウトになることがある。", a: true, hint: "走者の妨害により併殺が妨げられた場合、打者走者もアウトになることがあります。" },
  { q: "ソフトボールの試合で、15点差以上がついた場合は3イニング終了でコールドゲームが成立する。", a: true, hint: "大量点差のマーシールール（得点差コールド）では、15点差3回・10点差4回・7点差5回で成立します。" },
  { q: "ソフトボールでは、投手がサイン中に軸足をプレートに触れていなくてもよい。", a: false, hint: "投手はサインを受ける際、軸足をプレートに触れていなければなりません。" },
  { q: "ソフトボールのホームベースの形状は、野球のホームベースと全く同じである。", a: true, hint: "ホームベースの形状は野球と同じ五角形で、サイズも同一です。" },
  { q: "ソフトボールでは、故意落球のルールが適用されるのは内野フライの場合のみである。", a: false, hint: "故意落球はフライだけでなくライナーにも適用されます。" },
  { q: "走者が塁を離れているとき、投手がプレートを踏んだままボールを持っていれば、走者は塁に戻らなければならない。", a: true, hint: "投手がプレートに触れてボールを保持している場合、走者は速やかに帰塁する義務があります。" },

  { q: "ソフトボールでは、投手はプレイ宣告後20秒以内に投球しなければならない。", a: true, hint: "試合のスピードアップのため、投手はプレイ宣告後20秒以内に投球する義務があります。" },
  { q: "ソフトボールでは、走者が前の走者を追い越した場合、追い越した走者がアウトになる。", a: true, hint: "前位の走者を追い越した走者がアウトとなります。前位の走者はアウトになりません。" },
  { q: "ソフトボールでは、守備側が打ち合わせ（マウンド訪問）をできる回数に制限はない。", a: false, hint: "1イニングにつき攻撃側の打者3人に対して1回の打ち合わせが認められ、規定回数を超えると投手は交代となります。" },

  { q: "ソフトボールの投手板（ピッチャープレート）のサイズは、野球の投手板と同じである。", a: true, hint: "投手板は15.24cm×60.96cmの長方形で、野球と同じサイズです。" },
  { q: "ソフトボールのコーチャーボックスは、ベースラインから3.66m離れた位置にある。", a: true, hint: "コーチャーボックスは1塁・3塁のベースラインからファウル地域側に3.66m離し、長さ4.75m×幅0.91mの長方形です。" },
  { q: "ソフトボールの次打者席（ネクストバッターズサークル）は半径1mの円である。", a: false, hint: "次打者席は半径0.76m（2.5フィート）のサークルです。1mではありません。" },
  { q: "ソフトボールのベース（一塁-三塁）は一辺38.1cmの正方形である。", a: true, hint: "一塁から三塁の塁は一辺38.1cm（15インチ）の正方形で、厚さは7.62-12.7cmです。" },
  { q: "ソフトボールのダブルベース（一塁）の全体サイズは、38.1cm×76.2cmである。", a: true, hint: "ダブルベースは白色（フェア側）とオレンジ色（ファウル側）各38.1cmを合わせた38.1cm×76.2cmです。" },
  { q: "ソフトボールの捕手席は、打者席の後ろの角から3.05m離れた幅2.56mの領域である。", a: true, hint: "捕手席は打者席後方角から3.05m、幅2.56mの領域です。捕手はこの中で構えます。" },
  { q: "ソフトボールでは、野球と同様にピッチャーマウンド（盛り土）がある。", a: false, hint: "ソフトボールにはマウンドがなく、ピッチャーズサークル内も他のグラウンドと同じ平坦な地面です。" },
  { q: "ソフトボールのホームベースは、投手板と平行な辺が43.18cmの五角形である。", a: true, hint: "ホームベースは投手板側が43.18cm、打者席側が21.59cm、斜辺が各30.48cmの五角形です。野球と同じ形状です。" },
  { q: "小学生のソフトボールの投球距離（投手板-本塁）は、2025年から12.19mに延伸された。", a: true, hint: "2025年のルール改正で小学生の投球距離が従来の10.67mから12.19mに延伸されました。" },
  { q: "ソフトボールの本塁から外野フェンスまでの距離は、男子と女子で同じである。", a: false, hint: "男子は68.58m（225フィート）以上、女子は60.96m（200フィート）以上と異なります。" },
  { q: "ソフトボールのスリーフットレーンは、本塁と一塁の中間地点から一塁までの区間に設けられる。", a: true, hint: "スリーフットレーンは本塁-一塁間の中間地点から一塁まで、ファウル地域に幅0.91m（3フィート）で設けられます。" },
  { q: "2018年のルール改正前、ソフトボールのストライクゾーンの上限は「脇の下」だった。", a: true, hint: "改正前は「打ちに行く姿勢での脇の下から膝頭の上部」でしたが、2018年に「自然に構えたときのみぞおちから膝の皿の底部」に変更されました。" },
  { q: "現在のソフトボールのストライクゾーンは、ボールがホームベース上を完全に通過しなくてもストライクになる。", a: true, hint: "2018年改正で、ホームベース上に想定される五角柱の空間のどこかをボールが通過すればストライクとなりました。改正前は完全通過が必要でした。" },
  { q: "2018年の改正で、ソフトボールのストライクゾーンの横幅（内外角）も変更された。", a: true, hint: "改正後はボールがホームベースに「接して」いればストライクとなり、ベース上にかかっていなくてもOKになりました。横幅が実質的に広がりました。" },
  { q: "現在のソフトボールのストライクゾーンの下限は「膝頭の上部」である。", a: false, hint: "2018年改正で下限は「膝の皿の底部」に変更されました。改正前の「膝頭の上部」より低くなっています。" },
  { q: "ソフトボールのストライクゾーンを決める基準姿勢は、「打ちに行く姿勢」である。", a: false, hint: "2018年改正で「打ちに行く姿勢」から「自然に構えたとき（スイングする前）」に変更されました。" },
  { q: "ソフトボールの女子の投球距離は、かつては12.19m（40フィート）だった。", a: true, hint: "女子の投球距離は2002年の国際ルール改正まで12.19m（40フィート）でしたが、現在は13.11m（43フィート）に延伸されています。" },
  { q: "ソフトボールは、元々は屋内スポーツとして誕生した。", a: true, hint: "1887年にアメリカのシカゴで、屋内の体育館でのレクリエーションとして始まりました。当初は「インドア・ベースボール」と呼ばれていました。" },
  { q: "かつてソフトボールでは、投手のツーステップ（クローホップ）は不正投球とされていた。", a: true, hint: "2012年のルール改正までツーステップは不正投球でしたが、現在は認められています。" },
  { q: "ソフトボールがオリンピック正式種目になったのは、1996年アトランタ大会からである。", a: true, hint: "女子ソフトボールは1996年アトランタ大会で正式種目となり、2008年北京大会後に一度除外されましたが、2020年東京大会で復活しました。" },
  { q: "2018年のストライクゾーン改正前は、ドロップボールがベース上で急落下してストライクゾーンを通過できなかった場合、ボールと判定されていた。", a: true, hint: "改正前はストライクゾーンを完全に通過する必要があったため、ベース手前で落ちるドロップはボールでした。改正後はゾーンのどこかを通ればストライクです。" },
  { q: "ソフトボールの国際大会で使用される公式球の色は白色である。", a: false, hint: "国際大会で使用される公式球は黄色（オプティックイエロー）で、縫い糸は赤色です。2002年から視認性向上のため国際大会で採用されました。" },
  { q: "ソフトボールの「ソフトボール」という名称は、最初から使われていた。", a: false, hint: "当初は「インドア・ベースボール」「キトンボール」「ダイヤモンドボール」など様々な名称で呼ばれ、「ソフトボール」に統一されたのは1926年頃です。" },
];
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function playTone(f,d,t,v){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=v||0.3;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d)}
function soundCorrect(){playTone(880,0.15,'sine',0.25);setTimeout(function(){playTone(1320,0.3,'sine',0.25)},120)}
function soundWrong(){playTone(200,0.2,'square',0.15);setTimeout(function(){playTone(150,0.4,'square',0.15)},150)}
function soundTap(){playTone(600,0.05,'sine',0.15)}
function soundStart(){playTone(523,0.12,'sine',0.2);setTimeout(function(){playTone(659,0.12,'sine',0.2)},100);setTimeout(function(){playTone(784,0.25,'sine',0.2)},200)}
function soundResult(){playTone(523,0.15,'sine',0.2);setTimeout(function(){playTone(659,0.15,'sine',0.2)},150);setTimeout(function(){playTone(784,0.15,'sine',0.2)},300);setTimeout(function(){playTone(1047,0.4,'sine',0.25)},450)}
var TOTAL_Q=10,questions=[],idx=0,score=0,selected=null,history=[],streak=0,bestStreak=0;
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function $(id){return document.getElementById(id)}
function showScreen(n){['screen-start','screen-quiz','screen-result'].forEach(function(s){$(s).classList.toggle('hidden',s!=='screen-'+n)})}
function startQuiz(){initAudio();soundStart();questions=shuffle(QUESTIONS).slice(0,TOTAL_Q);idx=0;score=0;selected=null;history=[];streak=0;bestStreak=0;showScreen('quiz');renderQuestion()}
function renderQuestion(){var q=questions[idx];$('progress-fill').style.width=((idx+1)/TOTAL_Q*100)+'%';$('q-num').textContent='Q'+(idx+1)+'/'+TOTAL_Q;var s=score+'点';if(streak>=2)s+=' <span class="streak-badge">🔥'+streak+'連続</span>';$('score-label').innerHTML=s;$('question-text').textContent=q.q;var m=$('btn-maru'),b=$('btn-batsu');m.disabled=false;b.disabled=false;m.className='btn-ans btn-ans--maru';b.className='btn-ans btn-ans--batsu';$('feedback').classList.add('hidden');selected=null;$('screen-quiz').classList.remove('fade-exit');$('screen-quiz').classList.add('fade-enter')}
function handleAnswer(ans){if(selected!==null)return;initAudio();selected=ans;var q=questions[idx],correct=ans===q.a;if(correct){soundCorrect();score++;streak++}else{soundWrong();streak=0}if(streak>bestStreak)bestStreak=streak;history.push({correct:correct});var s=score+'点';if(streak>=2)s+=' <span class="streak-badge">🔥'+streak+'連続</span>';$('score-label').innerHTML=s;var m=$('btn-maru'),b=$('btn-batsu');m.disabled=true;b.disabled=true;if(q.a===true)m.classList.add('btn-ans--correct');else b.classList.add('btn-ans--correct');if(!correct){if(ans===true)m.classList.add('btn-ans--wrong');else b.classList.add('btn-ans--wrong')}if(q.a===true)b.classList.add('btn-ans--dim');else m.classList.add('btn-ans--dim');var fb=$('feedback');fb.classList.remove('hidden','feedback--correct','feedback--wrong');fb.classList.add(correct?'feedback--correct':'feedback--wrong');$('fb-icon').textContent=correct?'✅':'❌';$('fb-title').textContent=correct?'正解！':'不正解…';$('fb-hint').textContent=q.hint;$('btn-next').textContent=(idx+1>=TOTAL_Q)?'結果を見る':'次の問題へ →'}
function nextQuestion(){soundTap();if(idx+1>=TOTAL_Q){showResult()}else{$('screen-quiz').classList.add('fade-exit');$('screen-quiz').classList.remove('fade-enter');setTimeout(function(){idx++;renderQuestion()},200)}}
function showResult(){showScreen('result');soundResult();var g;if(score===TOTAL_Q)g={label:'完璧！',emoji:'🏆',msg:'ソフトボール博士！全問正解は見事です！'};else if(score>=8)g={label:'素晴らしい！',emoji:'🥇',msg:'かなりの知識量ですね！'};else if(score>=6)g={label:'なかなか！',emoji:'🥈',msg:'上級者として十分な実力です。'};else if(score>=4)g={label:'まずまず',emoji:'🥉',msg:'もう少し勉強してみましょう！'};else g={label:'要復習',emoji:'📖',msg:'ルールブックを読み直してリベンジ！'};$('res-emoji').textContent=g.emoji;$('res-grade').textContent=g.label;$('res-score').textContent=score;$('res-denom').textContent='/ '+TOTAL_Q;$('res-msg').textContent=g.msg;var se=$('res-streak');if(bestStreak>=2){se.textContent='最大連続正解: 🔥'+bestStreak;se.classList.remove('hidden')}else{se.classList.add('hidden')}var w=$('review-wrap');w.innerHTML='';history.forEach(function(h,i){var d=document.createElement('div');d.className='review-item '+(h.correct?'review-item--ok':'review-item--ng');d.innerHTML='<span>'+(h.correct?'✅':'❌')+'</span><span>Q'+(i+1)+'</span>';w.appendChild(d)})}
$('btn-start').addEventListener('click',startQuiz);
</script>
